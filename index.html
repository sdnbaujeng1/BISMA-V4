<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>SDN Baujeng 1</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter"
      // when some library tries to polyfill fetch
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function(val) { /* ignore */ },
          configurable: true
        });
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Unregister service workers and clear caches to ensure users always get the latest version
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
              console.log('ServiceWorker unregistered');
            }
          });
        });
      }
      
      if ('caches' in window) {
        caches.keys().then((names) => {
          for (const name of names) {
            caches.delete(name);
            console.log('Cache deleted:', name);
          }
        });
      }
    </script>
  </body>
</html>
